<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parabéns!</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .container {
      z-index: 10;
    }

    h1 {
      font-size: 4.5rem;
      margin: 0 0 10px 0;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }

    .nome {
      font-size: 5rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,215,0,0.9);
      margin: 10px 0 20px 0;
    }

    p {
      font-size: 1.8rem;
      margin: 20px 0 40px;
      opacity: 0.95;
    }

    .emoji {
      font-size: 5.5rem;
      animation: bounce 2s infinite;
    }

    button {
      padding: 16px 45px;
      font-size: 1.4rem;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    button:hover {
      transform: scale(1.08);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-25px); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="emoji">🎉🎂🎁</div>
    <h1>Parabéns!</h1>
    <div class="nome" id="nomePessoa">CAIO</div>
    <p>Que seu dia seja incrível e cheio de alegrias!</p>
    <button onclick="lançarConfetes()">🎊 Soltar Confetes 🎊</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    function lançarConfetes() {
      confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
    }

    // Lança confetes ao carregar a página
    window.onload = function() {
      setTimeout(lançarConfetes, 600);
      setTimeout(lançarConfetes, 1400);
    };
  </script>

</body>
</html>
